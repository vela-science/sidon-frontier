name: Verify the signed frontier

# The git-native gate, via the shared action: on every change to the signed
# frontier, the pinned Vela release re-derives it from a clean checkout and
# proves the working tree IS the signed state (replay + signatures + hash
# parity), then re-runs every frozen verifier on every stored witness. It NEVER
# signs and NEVER merges. GitHub branch protection owns the merge gate.
on:
  push:
    branches: [main]
    paths:
      - ".vela/**"
      - "frontier.json"
      - "frontier.yaml"
      - "vela.lock"
      - "proof/**"
      - "witnesses/**"
      - ".github/workflows/vela-frontier.yml"
  pull_request:
    paths:
      - ".vela/**"
      - "frontier.json"
      - "frontier.yaml"
      - "vela.lock"
      - "proof/**"
      - "witnesses/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: vela-science/vela@273a82db549673ae336c9fa3374393e7ea19be04 # v0.910.0
        with:
          frontier: .
          vela-version: v0.910.0
      # A stranger re-runs every frozen verifier on every stored witness from a
      # clean checkout. `vela` is on PATH from the action above. This is the
      # un-forgeable floor the exact-lane admissions rest on.
      - name: Reproduce every witness from scratch
        run: vela reproduce .
